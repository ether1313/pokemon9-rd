<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>Redirecting…</title>

    <!-- Fallback redirect (some environments block JS) -->
    <meta http-equiv="refresh" content="3;url=https://pokemon9aus.bet" />

    <style>
      /* Intentionally near-blank */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #fff;
      }
      #status {
        position: fixed;
        top: 10px;
        left: 10px;
        font: 12px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: #111;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        user-select: none;
      }
      #status .spinner {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        border: 2px solid rgba(0, 0, 0, 0.15);
        border-top-color: rgba(0, 0, 0, 0.75);
        animation: spin 0.8s linear infinite;
      }
      #status .label {
        letter-spacing: 0.2px;
      }
      #status .dots::after {
        content: "";
        display: inline-block;
        width: 14px; /* keeps layout stable */
        text-align: left;
        animation: dots 1.1s steps(4, end) infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes dots {
        0% {
          content: "";
        }
        25% {
          content: ".";
        }
        50% {
          content: "..";
        }
        75% {
          content: "...";
        }
        100% {
          content: "";
        }
      }
      /* Keep text visually hidden but accessible */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>

    <script>
      (function () {
        // ======= CONFIG =======
        var DEFAULT_TARGET = "https://pokemon9aus.bet";
        var DELAY_MS = 2500; // 2–3 seconds (2000–3000ms)

        // Allow ?to= override, with host allowlist (avoid open redirects)
        var ALLOWED_HOSTS = new Set([
          new URL(DEFAULT_TARGET).host,
          // "www.your-domain.com",
        ]);

        function getTargetFromQuery() {
          try {
            var params = new URLSearchParams(window.location.search);
            var to = params.get("to");
            if (!to) return null;

            // Accept full URL or a path (/path)
            if (to.startsWith("/")) return new URL(to, DEFAULT_TARGET).toString();

            var u = new URL(to);
            if (!ALLOWED_HOSTS.has(u.host)) return null;
            return u.toString();
          } catch (_) {
            return null;
          }
        }

        var target = getTargetFromQuery() || DEFAULT_TARGET;

        // Update meta refresh target to match chosen target
        var meta = document.querySelector('meta[http-equiv="refresh"]');
        if (meta) meta.setAttribute("content", "3;url=" + target);

        setTimeout(function () {
          // replace() keeps this page out of browser history
          window.location.replace(target);
        }, DELAY_MS);
      })();
    </script>
  </head>
  <body>
    <div id="status" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <span class="label">Connecting, be patient<span class="dots" aria-hidden="true"></span></span>
    </div>
    <div class="sr-only">Redirecting…</div>
    <noscript>
      <meta http-equiv="refresh" content="0;url=https://pokemon9aus.bet" />
      <a href="https://pokemon9aus.bet">Click here to continue</a>
    </noscript>
  </body>
</html>
